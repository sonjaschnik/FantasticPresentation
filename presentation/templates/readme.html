<!DOCTYPE html>
<html>
<head>
    <title>README</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true });</script>
    <style>
      .esg-table { width: 100%; border-collapse: collapse; font-size: 14px; }
      .esg-table th { padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; border-bottom: 1px solid var(--color-border-tertiary); }
      .esg-table td { padding: 10px 16px; vertical-align: top; border-bottom: 0.5px solid var(--color-border-tertiary); }
      .esg-table tr:last-child td { border-bottom: none; }
      .metric { font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
      .desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
      .th-e { background: #E1F5EE; color: #085041; }
      .th-s { background: #E6F1FB; color: #0C447C; }
      .th-g { background: #EEEDFE; color: #3C3489; }
      .geo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 4px 0 16px; }
      .geo-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
      .geo-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
      .geo-flag { font-size: 22px; line-height: 1; }
      .geo-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
      .geo-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; }
      .badge-strict { background: #FCEBEB; color: #A32D2D; }
      .badge-moderate { background: #FAEEDA; color: #633806; }
      .badge-voluntary { background: #E1F5EE; color: #085041; }
      .badge-growing { background: #E6F1FB; color: #0C447C; }
      .geo-points { list-style: none; padding: 0; margin: 0; }
      .geo-points li { font-size: 13px; color: var(--color-text-secondary); padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); line-height: 1.5; display: flex; gap: 8px; }
      .geo-points li:last-child { border-bottom: none; }
      .geo-points li::before { content: "—"; color: var(--color-text-tertiary); flex-shrink: 0; }
      .framework-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
      .fw-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: #EEEDFE; color: #3C3489; }
    </style>
</head>
<body>
    {{ readme_html|safe }}
    <p><a href="{% url 'home' %}">Back</a></p>
</body>
</html>
